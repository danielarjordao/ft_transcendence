services:
  db:
    image: postgres:15-alpine
    container_name: transcendence_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    command: sh -c "npx prisma generate && sleep 3 && npx prisma db push && npm run start:dev"
    container_name: transcendence_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - ./certs:/app/certs:ro
      - /app/node_modules
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      PORT: "${PORT}"
      NODE_ENV: "${NODE_ENV}"
      FRONTEND_URL: "${FRONTEND_URL}"
      API_URL: "${API_URL}"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_ACCESS_EXPIRES_IN: "${JWT_ACCESS_EXPIRES_IN}"
      JWT_REFRESH_EXPIRES_IN: "${JWT_REFRESH_EXPIRES_IN}"
      JWT_2FA_SECRET: "${JWT_2FA_SECRET}"
      JWT_2FA_EXPIRES_IN: "${JWT_2FA_EXPIRES_IN}"
      AUTH_TOKEN_PEPPER: "${AUTH_TOKEN_PEPPER}"
      AUTH_ENCRYPTION_KEY: "${AUTH_ENCRYPTION_KEY}"
      PASSWORD_RESET_EXPIRES_MINUTES: "${PASSWORD_RESET_EXPIRES_MINUTES}"
      PASSWORD_RESET_FRONTEND_URL: "${PASSWORD_RESET_FRONTEND_URL}"
      FORTY_TWO_CLIENT_ID: "${FORTY_TWO_CLIENT_ID}"
      FORTY_TWO_CLIENT_SECRET: "${FORTY_TWO_CLIENT_SECRET}"
      FORTY_TWO_CALLBACK_URL: "${FORTY_TWO_CALLBACK_URL}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      SMTP_FROM: "${SMTP_FROM}"
      AWS_REGION: "${AWS_REGION}"
      AWS_BUCKET_NAME: "${AWS_BUCKET_NAME}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      HTTPS_ENABLED: "${HTTPS_ENABLED}"
      HTTPS_KEY_PATH: "${HTTPS_KEY_PATH}"
      HTTPS_CERT_PATH: "${HTTPS_CERT_PATH}"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: transcendence_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "${VITE_API_URL}"
    depends_on:
      - backend

volumes:
  pgdata:
